name: Build FnNAS Orange Pi 5 Ultra

env:
  DEFAULT_BASE_IMAGE_URL: "http://thunder.liveupdate.fnnas.com:8080/arm/trim/1.1.31/rock-5b/fnos_Mainland-PE_arm_1.1.31_rock-5b_1353.img.gz"

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build-fnnas-orangepi5ultra.yml"
      - "scripts/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      base_image_url:
        description: "Optional direct URL for the official FnNAS ARM64 .img, .img.gz, or .img.xz base image"
        required: false
        type: string
      kernel_ref:
        description: "Orange Pi BSP kernel branch or tag"
        required: true
        default: "orange-pi-6.1-rk35xx"
        type: string
      fnnas_ref:
        description: "ophub/fnnas branch, tag, or commit"
        required: true
        default: "main"
        type: string
      kernel_tag:
        description: "FnNAS kernel tag passed to ./renas -k"
        required: true
        default: "6.18.y"
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git make gcc bison flex libssl-dev bc \
            gcc-aarch64-linux-gnu device-tree-compiler \
            u-boot-tools wget xz-utils zip unzip python3

      - name: Build Orange Pi 5 Ultra DTB
        env:
          KERNEL_REF: ${{ inputs.kernel_ref }}
        run: bash scripts/build-dtb.sh

      - name: Build Orange Pi 5 Ultra U-Boot
        run: bash scripts/build-uboot.sh

      - name: Prepare FnNAS packaging tree
        env:
          FNNAS_REF: ${{ inputs.fnnas_ref }}
        run: bash scripts/prepare-fnnas.sh build/dtb/rk3588-orangepi-5-ultra.dtb build/u-boot/orangepi-5-ultra

      - name: Install FnNAS packaging dependencies
        run: |
          sudo apt install -y $(cat work/fnnas/make-fnnas/script/ubuntu2404-make-fnnas-depends)

      - name: Download FnNAS ARM64 base image
        env:
          REQUESTED_BASE_IMAGE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_image_url || '' }}
        run: |
          base_image_url="${REQUESTED_BASE_IMAGE_URL:-${DEFAULT_BASE_IMAGE_URL}}"
          mkdir -p work/fnnas/fnnas-arm64
          filename="$(basename "${base_image_url}")"
          wget -O "work/fnnas/fnnas-arm64/${filename}" "${base_image_url}"
          case "${filename}" in
            *.img.gz)
              gunzip -f "work/fnnas/fnnas-arm64/${filename}"
              ;;
            *.img.xz)
              xz -d -f "work/fnnas/fnnas-arm64/${filename}"
              ;;
            *.img)
              ;;
            *)
              echo "Unsupported base image extension: ${filename}" >&2
              exit 1
              ;;
          esac
          ls -lh work/fnnas/fnnas-arm64

      - name: Package FnNAS image
        working-directory: work/fnnas
        env:
          PACKAGE_KERNEL_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.kernel_tag || '6.18.y' }}
        run: sudo ./renas -b orangepi-5-ultra -k "${PACKAGE_KERNEL_TAG}"

      - name: List generated files
        if: always()
        run: |
          find build work -maxdepth 6 -type f \
            \( -name "*.dtb" -o -name "*.img" -o -name "*.img.xz" -o -name "*.log" \) \
            -print

      - name: Upload DTB and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangepi-5-ultra-dtb-and-logs
          path: |
            build/dtb/rk3588-orangepi-5-ultra.dtb
            build/u-boot/orangepi-5-ultra/*
            work/dtbs.log
            work/u-boot.log
            work/model_database.patch.log
            work/uboot.patch.log
          if-no-files-found: warn

      - name: Upload packaged FnNAS image
        uses: actions/upload-artifact@v4
        with:
          name: fnnas-orangepi-5-ultra-image
          path: |
            work/fnnas/out/*
            work/fnnas/fnnas/out/*
          if-no-files-found: error
